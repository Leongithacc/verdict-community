name = "verdict-community"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Cron notturno (3:00 UTC) — ricalcola la tabella stats_cache.
[triggers]
crons = ["0 3 * * *"]

# D1 binding. Dopo `npm run db:create` riempi qui database_id con l'id che ti restituisce.
[[d1_databases]]
binding = "DB"
database_name = "verdict-evidence"
database_id = "a3f3e89e-ff56-40e8-bfd8-54abe71fb9a7"

# Rate limiting nativo Cloudflare Workers (10 req / 10 sec per IP, anti-flood base).
# Le regole più fini per-rig_signature sono nel codice (vedi src/index.ts).
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Observability gratis (Workers logs in dashboard).
[observability]
enabled = true
